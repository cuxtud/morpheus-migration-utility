name: Build & Release

on:
  # Normal path: merge a PR into master
  pull_request:
    types: [closed]
    branches:
      - master
  # Direct pushes to master do not fire pull_request; run from Actions → "Run workflow"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.VERSION }}"; then
            echo "ERROR: Tag v${{ steps.version.outputs.VERSION }} already exists. Bump VERSION before merging."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build all platforms
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.VERSION }}"
          GOOS=linux   GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/morpheus-snapshot-linux-amd64          ./cmd/server
          GOOS=linux   GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/morpheus-snapshot-linux-arm64          ./cmd/server
          GOOS=windows GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/morpheus-snapshot-windows-amd64.exe    ./cmd/server
          GOOS=darwin  GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/morpheus-snapshot-mac-intel            ./cmd/server
          GOOS=darwin  GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/morpheus-snapshot-mac-apple-silicon    ./cmd/server

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Morpheus Snapshot ${{ steps.version.outputs.TAG }}"
          body: |
            ## Morpheus Snapshot ${{ steps.version.outputs.TAG }}

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `morpheus-snapshot-linux-amd64` |
            | Linux ARM64 | `morpheus-snapshot-linux-arm64` |
            | Windows x64 | `morpheus-snapshot-windows-amd64.exe` |
            | macOS Intel | `morpheus-snapshot-mac-intel` |
            | macOS Apple Silicon (M1/M2/M3/M4) | `morpheus-snapshot-mac-apple-silicon` |
          files: |
            dist/morpheus-snapshot-linux-amd64
            dist/morpheus-snapshot-linux-arm64
            dist/morpheus-snapshot-windows-amd64.exe
            dist/morpheus-snapshot-mac-intel
            dist/morpheus-snapshot-mac-apple-silicon
            dist/checksums.txt